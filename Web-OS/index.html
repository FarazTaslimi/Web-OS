<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Off</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw; height: 100vh;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .glow {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(160px);
        }
        .glow1 { width: 600px; height: 600px; background: radial-gradient(circle, #1a1a2e 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.8; }
        .power-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            z-index: 1;
            animation: fadeIn 1.2s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .power-btn {
            width: 96px; height: 96px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            outline: none;
        }
        .power-btn::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(96,205,255,0.4) 85%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .power-btn:hover::before { opacity: 1; }
        .power-btn:active { transform: scale(0.94); }
        .power-btn svg { width: 34px; height: 34px; color: rgba(255,255,255,0.75); transition: color 0.3s; }
        .power-btn:hover svg { color: #60cdff; }
        .power-label {
            font-size: 0.78rem;
            font-weight: 300;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }
        .loading {
            margin-top: 16px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            display: none;
        }
        .screen-flash {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 99;
            transition: opacity 0.15s;
        }
        .screen-flash.on { opacity: 0.06; }
    </style>
</head>
<body>
    <div class="glow glow1"></div>
    <div class="power-wrap" id="powerWrap">
        <button class="power-btn" id="powerBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
                <line x1="12" y1="2" x2="12" y2="12"/>
            </svg>
        </button>
        <span class="power-label">Power on</span>
        <div class="loading" id="loadingMsg">Starting services...</div>
    </div>
    <div class="screen-flash" id="flash"></div>

    <!-- Only one script – all libraries are loaded by index.js -->
    <script src="system/lib/index.js"></script>

    <script>
        // Helper to load scripts dynamically (still used for weblogin.js later)
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = () => reject(new Error(`Failed to load ${src}`));
                document.head.appendChild(script);
            });
        }

        async function loadDesktop() {
            const powerWrap = document.getElementById('powerWrap');
            if (powerWrap) powerWrap.style.display = 'none';
            if (!document.getElementById('root')) {
                const root = document.createElement('div');
                root.id = 'root';
                root.style.width = '100%';
                root.style.height = '100%';
                document.body.appendChild(root);
            }
            // All libraries are already loaded by index.js, so just start services
            if (window.ServiceManager) {
                await window.ServiceManager.startAll();
                console.log('[Index] Desktop loaded.');
            } else {
                console.error('[Index] ServiceManager not available');
            }
        }

        (async function() {
            // 1. Check power state from server
            let powerOn = false;
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                powerOn = (data.power === 'on');
            } catch(e) { console.warn('Status check failed', e); }

            // 2. If power is on and token is valid, load desktop directly (skip power button and login)
            if (powerOn) {
                const token = localStorage.getItem('authToken');
                if (token) {
                    try {
                        const verifyRes = await fetch('/api/verify-token', {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (verifyRes.ok) {
                            await loadDesktop();
                            return;
                        } else {
                            localStorage.removeItem('authToken');
                        }
                    } catch(e) { console.warn(e); }
                }
            }

            // 3. Otherwise show the power button and handle power-on
            const powerBtn = document.getElementById('powerBtn');
            const loadingMsg = document.getElementById('loadingMsg');
            const flash = document.getElementById('flash');
            document.getElementById('powerWrap').style.display = 'flex';

            powerBtn.addEventListener('click', async () => {
                powerBtn.disabled = true;
                loadingMsg.style.display = 'block';
                flash.classList.add('on');
                
                // Set power status to on
                await fetch('/api/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ power: 'on' })
                });
                
                // Boot server (loads SystemService and drivers)
                const bootRes = await fetch('/api/boot', { method: 'POST' });
                if (!bootRes.ok) {
                    loadingMsg.textContent = 'Boot failed. Please refresh.';
                    return;
                }
                
                // Load the lock screen (weblogin.js)
                document.body.innerHTML = '<div id="root" style="width:100%;height:100%"></div>';
                const loginScript = document.createElement('script');
                loginScript.src = 'weblogin.js';
                document.body.appendChild(loginScript);
            });
        })();
    </script>
</body>
</html>
